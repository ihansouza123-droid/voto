<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Votação</title>
    <!-- Ícone da Aba do Navegador (Favicon - Máquina Fotográfica) -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2306b6d4' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z'/%3E%3Ccircle cx='12' cy='13' r='3'/%3E%3C/svg%3E" type="image/svg+xml">
    <!-- Carregar Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configuração do Tailwind para animações personalizadas -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    keyframes: {
                        shimmer: {
                            '0%': { transform: 'translateX(-100%)' },
                            '100%': { transform: 'translateX(100%)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Pequenos ajustes para transições suaves */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        .zoom-in { animation: zoomIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 font-sans selection:bg-cyan-500/30">

    <!-- Navegação Superior -->
    <nav class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-0 sm:px-6 lg:px-8">
            <div class="flex justify-between h-auto sm:h-16" id="nav-container">
                <!-- Botões de navegação serão gerados por JS -->
            </div>
        </div>
    </nav>

    <!-- Área Principal -->
    <main id="app-container" class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
        <!-- O conteúdo dinâmico será injetado aqui -->
    </main>

    <!-- Modal Container -->
    <div id="modal-container"></div>

    <script>
        // Capturar o HTML original exato no momento de abertura da página para exportação
        window.__PRISTINE_HTML = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;

        // Ícones em formato SVG (Strings)
        const icons = {
            vote: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 12 2 2 4-4"/><path d="M5 18v-6a5 5 0 0 1 5-5h4a5 5 0 0 1 5 5v6H5Z"/><path d="M19 18v2a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-2"/></svg>`,
            chart: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>`,
            settings: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>`,
            plus: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>`,
            trash: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>`,
            edit: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
            check: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>`,
            alert: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>`,
            download: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>`
        };

        // Estado Global da Aplicação
        // /* CANDIDATES_DATA_START */
        const DEFAULT_CANDIDATES = [
            { id: 1, name: 'Candidato Alfa', votes: 0 },
            { id: 2, name: 'Candidata Beta', votes: 0 },
        ];
        // /* CANDIDATES_DATA_END */

        let state = {
            activeTab: 'voting',
            candidates: [],
            successMsg: false,
            isEditing: false,
            currentForm: { id: null, name: '' },
            showResetConfirm: false,
            isAdminAuthenticated: false,
            adminLoginError: false,
            showExportSuccess: false
        };

        // Inicialização
        function init() {
            try {
                const saved = window.localStorage.getItem('voting_system_data');
                state.candidates = saved ? JSON.parse(saved) : DEFAULT_CANDIDATES;
                
                const authSaved = window.localStorage.getItem('voting_admin_auth');
                state.isAdminAuthenticated = authSaved === 'true';
            } catch (e) {
                console.error("Erro ao carregar dados", e);
                state.candidates = DEFAULT_CANDIDATES;
            }

            // Sincronização entre abas/janelas
            window.addEventListener('storage', (e) => {
                if (e.key === 'voting_system_data') {
                    state.candidates = JSON.parse(e.newValue);
                    render();
                }
                if (e.key === 'voting_admin_auth') {
                    state.isAdminAuthenticated = e.newValue === 'true';
                    render();
                }
            });

            render();
        }

        // Função para atualizar o LocalStorage e re-renderizar
        function updateCandidates(newCandidates) {
            state.candidates = newCandidates;
            try {
                window.localStorage.setItem('voting_system_data', JSON.stringify(state.candidates));
            } catch (e) {
                console.error("Erro ao guardar dados", e);
            }
            render();
        }

        // Mudar de Separador
        function setActiveTab(tab) {
            state.activeTab = tab;
            state.successMsg = false;
            state.isEditing = false;
            state.showResetConfirm = false;
            state.adminLoginError = false;
            state.showExportSuccess = false;
            render();
        }

        // Motor de Renderização Principal
        function render() {
            renderNav();
            
            const appContainer = document.getElementById('app-container');
            if (state.activeTab === 'voting') appContainer.innerHTML = getVotingHTML();
            else if (state.activeTab === 'results') appContainer.innerHTML = getResultsHTML();
            else if (state.activeTab === 'admin') appContainer.innerHTML = getAdminHTML();

            renderModal();
        }

        // --- NAVEGAÇÃO ---
        function renderNav() {
            const nav = document.getElementById('nav-container');
            const tabs = [
                { id: 'voting', icon: icons.vote, label: 'Votar' },
                { id: 'results', icon: icons.chart, label: 'Resultados' },
                { id: 'admin', icon: icons.settings, label: 'Gestão' }
            ];

            let html = '<div class="flex w-full sm:w-auto">';
            tabs.forEach(tab => {
                const isActive = state.activeTab === tab.id;
                const activeClass = isActive 
                    ? 'border-cyan-500 text-cyan-400 bg-slate-800/50 sm:bg-transparent' 
                    : 'border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-800/30 sm:hover:bg-transparent';
                
                html += `
                    <button onclick="setActiveTab('${tab.id}')" 
                        class="flex-1 sm:flex-none inline-flex flex-col sm:flex-row items-center justify-center px-2 sm:px-4 py-3 sm:py-2 border-b-2 text-xs sm:text-sm font-medium transition-colors ${activeClass}">
                        <div class="w-5 h-5 mb-1 sm:mb-0 sm:mr-2">${tab.icon}</div>
                        ${tab.label}
                    </button>
                `;
            });
            html += '</div>';
            nav.innerHTML = html;
        }

        // --- MÓDULO 1: VOTAÇÃO ---
        function handleVote(id) {
            const newCandidates = state.candidates.map(c => 
                c.id === id ? { ...c, votes: c.votes + 1 } : c
            );
            updateCandidates(newCandidates);
            
            state.successMsg = true;
            render();

            setTimeout(() => {
                if (state.activeTab === 'voting') {
                    state.successMsg = false;
                    render();
                }
            }, 2500);
        }

        function getVotingHTML() {
            if (state.successMsg) {
                return `
                    <div class="flex flex-col items-center justify-center h-[60vh] fade-in zoom-in px-4 text-center">
                        <div class="bg-cyan-500/20 p-6 rounded-full mb-6 text-cyan-400 drop-shadow-[0_0_15px_rgba(34,211,238,0.5)]">
                            <div class="w-20 h-20 sm:w-24 sm:h-24">${icons.check}</div>
                        </div>
                        <h2 class="text-3xl sm:text-4xl font-bold text-white mb-2 tracking-tight">Voto Registado!</h2>
                        <p class="text-cyan-200/70 text-base sm:text-lg">A preparar para o próximo jurado...</p>
                    </div>
                `;
            }

            if (state.candidates.length === 0) {
                return `
                    <div class="text-center py-20 text-slate-400 px-4 fade-in">
                        <div class="w-12 h-12 sm:w-16 sm:h-16 mx-auto mb-4 text-slate-600">${icons.alert}</div>
                        <p>Não há candidatos disponíveis para votação.</p>
                        <p class="text-sm mt-2">Vá ao separador de Gestão para adicionar candidatos.</p>
                    </div>
                `;
            }

            let html = `
                <div class="fade-in">
                    <div class="text-center mb-8 sm:mb-12">
                        <h1 class="text-3xl sm:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 tracking-tight">
                            Selecione o seu Voto
                        </h1>
                        <p class="mt-2 text-sm sm:text-base text-slate-400">Toque no candidato desejado para confirmar o voto.</p>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 sm:gap-8">
            `;

            state.candidates.forEach(candidate => {
                html += `
                    <button onclick="handleVote(${candidate.id})" class="group flex flex-col items-center bg-slate-900 rounded-2xl shadow-lg hover:shadow-cyan-900/20 border border-slate-800 transition-all duration-300 transform hover:-translate-y-2 overflow-hidden focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:ring-offset-2 focus:ring-offset-slate-950">
                        <div class="w-full h-48 sm:h-64 bg-slate-800 overflow-hidden relative border-b border-slate-700">
                            <div class="absolute inset-0 bg-gradient-to-t from-slate-900 to-transparent z-10 opacity-60"></div>
                            <div class="w-full h-full flex items-center justify-center bg-slate-950 text-cyan-500/80 font-black text-3xl sm:text-4xl tracking-widest group-hover:scale-110 group-hover:text-cyan-400 transition-all duration-700">
                                GRUPO ${candidate.id}
                            </div>
                        </div>
                        <div class="p-4 sm:p-6 w-full text-center bg-slate-900 z-20 relative">
                            <h3 class="text-lg sm:text-xl font-bold text-white line-clamp-1">${candidate.name}</h3>
                            <div class="mt-4 w-full sm:w-auto inline-flex items-center justify-center px-8 py-3 sm:py-2.5 border border-transparent text-sm sm:text-base font-semibold rounded-xl sm:rounded-full text-white bg-gradient-to-r from-cyan-500 to-blue-600 group-hover:from-cyan-400 group-hover:to-blue-500 shadow-[0_0_15px_rgba(34,211,238,0.2)] group-hover:shadow-[0_0_25px_rgba(34,211,238,0.4)] transition-all">
                                Votar
                            </div>
                        </div>
                    </button>
                `;
            });

            html += `</div></div>`;
            return html;
        }

        // --- MÓDULO 2: RESULTADOS ---
        function getResultsHTML() {
            const totalVotes = state.candidates.reduce((sum, c) => sum + c.votes, 0);
            const sortedCandidates = [...state.candidates].sort((a, b) => b.votes - a.votes);

            let html = `
                <div class="max-w-3xl mx-auto fade-in">
                    <div class="mb-6 sm:mb-8 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                        <div>
                            <h1 class="text-2xl sm:text-3xl font-extrabold text-white flex items-center tracking-tight">
                                <span class="relative flex h-3 w-3 sm:h-4 sm:w-4 mr-2 sm:mr-3">
                                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-500 opacity-75"></span>
                                    <span class="relative inline-flex rounded-full h-3 w-3 sm:h-4 sm:w-4 bg-red-500 drop-shadow-[0_0_8px_rgba(239,68,68,0.8)]"></span>
                                </span>
                                Resultados ao Vivo
                            </h1>
                            <p class="mt-1 sm:mt-2 text-sm sm:text-base text-slate-400">Acompanhamento em tempo real das votações.</p>
                        </div>
                        <div class="text-left sm:text-right bg-slate-900 sm:bg-transparent p-4 sm:p-0 rounded-xl sm:rounded-none border sm:border-none border-slate-800 w-full sm:w-auto flex flex-row sm:flex-col justify-between items-center sm:items-end">
                            <p class="text-xs sm:text-sm text-cyan-400/80 uppercase tracking-widest font-semibold mb-1">Total de Votos</p>
                            <p class="text-3xl sm:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">${totalVotes}</p>
                        </div>
                    </div>
                    <div class="bg-slate-900 rounded-2xl shadow-xl border border-slate-800 overflow-hidden p-4 sm:p-6 space-y-6">
            `;

            if (sortedCandidates.length === 0) {
                html += `<p class="text-center text-slate-500 py-8">Nenhum candidato registado.</p>`;
            } else {
                sortedCandidates.forEach((candidate, index) => {
                    const percentage = totalVotes > 0 ? Math.round((candidate.votes / totalVotes) * 100) : 0;
                    const indexColor = index === 0 ? 'text-yellow-400 drop-shadow-[0_0_5px_rgba(250,204,21,0.5)]' : 
                                       index === 1 ? 'text-slate-300' : 
                                       index === 2 ? 'text-amber-600' : 'text-slate-600';
                    
                    html += `
                        <div class="relative group">
                            <div class="flex flex-col sm:flex-row sm:items-center mb-3 justify-between gap-1 sm:gap-0">
                                <div class="flex items-center">
                                    <span class="text-xl sm:text-2xl font-black w-8 sm:w-10 ${indexColor}">${index + 1}º</span>
                                    <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center bg-slate-950 text-cyan-500 text-xs sm:text-sm font-bold mr-3 border-2 border-slate-800 group-hover:border-cyan-500/50 group-hover:text-cyan-400 transition-colors shrink-0">
                                        G${candidate.id}
                                    </div>
                                    <span class="font-semibold text-sm sm:text-base text-slate-200 line-clamp-1">${candidate.name}</span>
                                </div>
                                <div class="text-right flex items-center justify-end sm:block ml-10 sm:ml-0">
                                    <span class="font-bold text-sm sm:text-base text-white">${candidate.votes} votos</span>
                                    <span class="text-cyan-300 ml-2 text-xs sm:text-sm font-medium bg-cyan-950/50 border border-cyan-900 px-2 py-0.5 rounded-full">(${percentage}%)</span>
                                </div>
                            </div>
                            <div class="w-full bg-slate-800/50 rounded-full h-3 sm:h-4 overflow-hidden border border-slate-800">
                                <div class="bg-gradient-to-r from-cyan-500 to-blue-600 h-3 sm:h-4 rounded-full transition-all duration-1000 ease-out relative" style="width: ${percentage}%">
                                    <div class="absolute inset-0 bg-white/20 w-full animate-[shimmer_2s_infinite]"></div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }

            html += `</div></div>`;
            return html;
        }

        // --- MÓDULO 3: GESTÃO ---
        function handleAdminLogin(event) {
            event.preventDefault();
            const form = event.target;
            const username = form.username.value;
            const password = form.password.value;

            if (username === 'carlos' && password === '1020') {
                state.isAdminAuthenticated = true;
                state.adminLoginError = false;
                window.localStorage.setItem('voting_admin_auth', 'true');
                render();
            } else {
                state.adminLoginError = true;
                render();
            }
        }

        function handleAdminLogout() {
            state.isAdminAuthenticated = false;
            window.localStorage.removeItem('voting_admin_auth');
            render();
        }

        function adminSetEditForm(id = null, name = '') {
            state.currentForm = { id, name };
            state.isEditing = true;
            render();
        }

        function adminCancelEdit() {
            state.isEditing = false;
            render();
        }

        function adminUpdateForm(field, value) {
            state.currentForm[field] = value;
        }

        function adminSave(event) {
            event.preventDefault();
            const { id, name } = state.currentForm;
            if (!name.trim()) return;

            let newCandidates = [...state.candidates];
            if (id) {
                newCandidates = newCandidates.map(c => c.id === id ? { ...c, name } : c);
            } else {
                const newId = newCandidates.length > 0 ? Math.max(...newCandidates.map(c => c.id)) + 1 : 1;
                newCandidates.push({ id: newId, name, votes: 0 });
            }
            
            updateCandidates(newCandidates);
            state.isEditing = false;
            render();
        }

        function adminDelete(id) {
            updateCandidates(state.candidates.filter(c => c.id !== id));
        }

        // Função de Exportação que "Grava no Código"
        function exportHTML() {
            // RegEx para encontrar exatamente a variável DEFAULT_CANDIDATES e alterá-la
            const regex = /\/\/ \/\* CANDIDATES_DATA_START \*\/[\s\S]*?\/\/ \/\* CANDIDATES_DATA_END \*\//;
            const replacement = `// /* CANDIDATES_DATA_START */\n        const DEFAULT_CANDIDATES = ${JSON.stringify(state.candidates, null, 12)};\n        // /* CANDIDATES_DATA_END */`;
            
            const newHTML = window.__PRISTINE_HTML.replace(regex, replacement);
            
            // Gerar e forçar o download do ficheiro HTML
            const blob = new Blob([newHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'index.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            // Mostrar mensagem de sucesso
            state.showExportSuccess = true;
            renderModal();
        }

        function getAdminHTML() {
            // Verificar Autenticação
            if (!state.isAdminAuthenticated) {
                return `
                    <div class="max-w-md mx-auto fade-in mt-10">
                        <div class="bg-slate-900 p-8 rounded-2xl shadow-lg border border-slate-800 relative">
                            <div class="text-center mb-6">
                                <h2 class="text-2xl font-bold text-white tracking-tight">Acesso Restrito</h2>
                                <p class="text-sm text-slate-400 mt-1">Faça login para gerir o sistema</p>
                            </div>
                            ${state.adminLoginError ? '<div class="bg-red-500/10 border border-red-500/50 text-red-400 p-3 rounded-lg text-sm text-center mb-6">Credenciais inválidas. Tente novamente.</div>' : ''}
                            <form onsubmit="handleAdminLogin(event)" class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-1.5">Usuário</label>
                                    <input type="text" name="username" required
                                        class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-white placeholder-slate-600 focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all"
                                        placeholder="Digite o usuário">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-1.5">Senha</label>
                                    <input type="password" name="password" required
                                        class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-white placeholder-slate-600 focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all"
                                        placeholder="Digite a senha">
                                </div>
                                <div class="pt-2">
                                    <button type="submit" class="w-full px-8 py-3 bg-cyan-500 text-slate-950 rounded-xl font-bold hover:bg-cyan-400 transition-colors">
                                        Entrar
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                `;
            }

            // Interface de Gestão (Autorizada)
            let html = `
                <div class="max-w-5xl mx-auto fade-in">
                    <div class="mb-6 sm:mb-8 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                        <div>
                            <h1 class="text-2xl sm:text-3xl font-extrabold text-white tracking-tight">Gestão</h1>
                            <p class="mt-1 sm:mt-2 text-sm sm:text-base text-slate-400">Adicione, edite ou remova candidatos.</p>
                        </div>
                        <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
                            <button onclick="adminSetEditForm()" class="w-full sm:w-auto justify-center inline-flex items-center px-4 py-3 sm:py-2.5 bg-gradient-to-r from-cyan-500 to-blue-600 text-white rounded-xl sm:rounded-lg hover:from-cyan-400 hover:to-blue-500 font-semibold transition-all shadow-[0_0_15px_rgba(34,211,238,0.15)]">
                                <div class="w-5 h-5 mr-2">${icons.plus}</div>
                                Novo
                            </button>
                            <button onclick="exportHTML()" class="w-full sm:w-auto justify-center inline-flex items-center px-4 py-3 sm:py-2.5 bg-emerald-600 text-white rounded-xl sm:rounded-lg hover:bg-emerald-500 font-semibold transition-all shadow-[0_0_15px_rgba(16,185,129,0.15)]">
                                <div class="w-5 h-5 mr-2">${icons.download}</div>
                                Exportar Código (Vercel)
                            </button>
                            <button onclick="handleAdminLogout()" class="w-full sm:w-auto justify-center inline-flex items-center px-4 py-3 sm:py-2.5 bg-slate-800 text-slate-300 rounded-xl sm:rounded-lg hover:bg-slate-700 font-medium transition-colors">
                                Sair
                            </button>
                        </div>
                    </div>
            `;

            if (state.isEditing) {
                // Prevenir aspas de quebrar o HTML no input
                const safeName = state.currentForm.name.replace(/"/g, '&quot;');
                
                html += `
                    <div class="mb-6 sm:mb-8 bg-slate-900 p-5 sm:p-6 rounded-2xl shadow-lg border border-slate-800 relative fade-in">
                        <h2 class="text-lg sm:text-xl font-bold text-white mb-5">${state.currentForm.id ? 'Editar Candidato' : 'Adicionar Novo Candidato'}</h2>
                        <form onsubmit="adminSave(event)" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-300 mb-1.5">Nome do Candidato</label>
                                <input type="text" required value="${safeName}" oninput="adminUpdateForm('name', this.value)"
                                    class="w-full px-4 py-3 sm:py-2.5 bg-slate-950 border border-slate-800 rounded-xl sm:rounded-lg text-white placeholder-slate-600 focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all"
                                    placeholder="Ex: João Silva">
                            </div>
                            <div class="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-3 pt-4">
                                <button type="submit" class="w-full sm:w-auto px-8 py-3 sm:py-2.5 bg-cyan-500 text-slate-950 rounded-xl sm:rounded-lg font-bold hover:bg-cyan-400 transition-colors">
                                    Guardar
                                </button>
                                <button type="button" onclick="adminCancelEdit()" class="w-full sm:w-auto px-8 py-3 sm:py-2.5 bg-slate-800 text-slate-300 rounded-xl sm:rounded-lg font-medium hover:bg-slate-700 transition-colors">
                                    Cancelar
                                </button>
                            </div>
                        </form>
                    </div>
                `;
            }

            html += `
                <div class="bg-slate-900 rounded-2xl shadow-lg border border-slate-800 overflow-hidden">
                    <div class="p-3 sm:p-5 bg-slate-800/30 border-b border-slate-800 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 sm:gap-0">
                        <h3 class="font-semibold text-slate-200 text-sm sm:text-base">Lista de Participantes</h3>
                        <button onclick="state.showResetConfirm=true; renderModal();" class="w-full sm:w-auto text-center text-sm text-red-400 hover:text-red-300 font-medium px-4 py-2 sm:px-3 sm:py-1.5 bg-red-950/30 hover:bg-red-900/40 border border-red-900/50 rounded-lg sm:rounded-md transition-colors">
                            Zerar todos os votos
                        </button>
                    </div>
                    <ul class="divide-y divide-slate-800">
            `;

            if (state.candidates.length === 0) {
                html += `<li class="p-8 text-center text-slate-500">Nenhum participante encontrado.</li>`;
            } else {
                state.candidates.forEach(candidate => {
                    // Prepara strings seguras para injetar no onclick
                    const safeNameEscaped = candidate.name.replace(/'/g, "\\'");

                    html += `
                        <li class="p-3 sm:p-5 flex flex-col sm:flex-row items-start sm:items-center justify-between hover:bg-slate-800/50 transition-colors gap-3 sm:gap-0">
                            <div class="flex items-center space-x-3 sm:space-x-4 w-full sm:w-auto">
                                <div class="w-10 h-10 sm:w-14 sm:h-14 rounded-full flex items-center justify-center bg-slate-950 text-cyan-500/80 text-xs sm:text-sm font-bold border border-slate-700 shrink-0">
                                    G${candidate.id}
                                </div>
                                <div class="min-w-0 flex-1">
                                    <p class="text-sm sm:text-base font-semibold text-slate-200 truncate">${candidate.name}</p>
                                    <p class="text-xs sm:text-sm text-cyan-500/80 mt-0.5">${candidate.votes} votos registados</p>
                                </div>
                            </div>
                            <div class="flex justify-end space-x-2 w-full sm:w-auto border-t sm:border-0 border-slate-800 pt-3 sm:pt-0">
                                <button onclick="adminSetEditForm(${candidate.id}, '${safeNameEscaped}')" class="p-2.5 text-slate-400 hover:text-cyan-400 hover:bg-cyan-950/30 rounded-lg transition-colors flex-1 sm:flex-none flex justify-center items-center" title="Editar">
                                    <div class="w-5 h-5 sm:w-5 sm:h-5">${icons.edit}</div>
                                </button>
                                <button onclick="adminDelete(${candidate.id})" class="p-2.5 text-slate-400 hover:text-red-400 hover:bg-red-950/30 rounded-lg transition-colors flex-1 sm:flex-none flex justify-center items-center" title="Remover">
                                    <div class="w-5 h-5 sm:w-5 sm:h-5">${icons.trash}</div>
                                </button>
                            </div>
                        </li>
                    `;
                });
            }

            html += `</ul></div></div>`;
            return html;
        }

        // --- GESTÃO DE MODAL (Zerar Votos e Feedback) ---
        function confirmReset() {
            updateCandidates(state.candidates.map(c => ({ ...c, votes: 0 })));
            state.showResetConfirm = false;
            renderModal();
            if(state.activeTab === 'admin' || state.activeTab === 'results') render();
        }

        function cancelReset() {
            state.showResetConfirm = false;
            renderModal();
        }

        function renderModal() {
            const container = document.getElementById('modal-container');
            if (state.showResetConfirm) {
                container.innerHTML = `
                    <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in">
                        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 sm:p-8 max-w-sm w-full shadow-2xl zoom-in">
                            <h3 class="text-xl sm:text-2xl font-bold text-white mb-3">Zerar todos os votos?</h3>
                            <p class="text-slate-400 mb-8 text-sm sm:text-base">Esta ação não pode ser desfeita. Todos os candidatos voltarão a ter 0 votos.</p>
                            <div class="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-3 justify-end">
                                <button onclick="cancelReset()" class="w-full sm:w-auto px-5 py-2.5 text-slate-300 bg-slate-800 hover:bg-slate-700 rounded-xl font-medium transition-colors">
                                    Cancelar
                                </button>
                                <button onclick="confirmReset()" class="w-full sm:w-auto px-5 py-2.5 bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white border border-red-500/20 hover:border-red-500 rounded-xl font-medium transition-all shadow-sm">
                                    Sim, zerar
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            } else if (state.showExportSuccess) {
                container.innerHTML = `
                    <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in">
                        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 sm:p-8 max-w-sm w-full shadow-2xl zoom-in text-center">
                            <div class="w-16 h-16 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-4">
                                <div class="w-8 h-8">${icons.check}</div>
                            </div>
                            <h3 class="text-xl sm:text-2xl font-bold text-white mb-2">Código Exportado!</h3>
                            <p class="text-slate-400 mb-6 text-sm sm:text-base">O ficheiro <strong class="text-slate-200">index.html</strong> com as suas alterações gravadas no código foi transferido. Pode enviá-lo diretamente para o Vercel.</p>
                            <button onclick="state.showExportSuccess = false; renderModal();" class="w-full px-5 py-2.5 bg-slate-800 hover:bg-slate-700 text-white rounded-xl font-medium transition-colors">
                                Entendido
                            </button>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = '';
            }
        }

        // Arrancar o sistema
        init();
    </script>
</body>
</html>
